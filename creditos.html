<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créditos | Next Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 1. EL FONDO SEGURO */
        body, html { 
            width: 100%; 
            height: 100%;
            background-color: #000; 
            background-image: url('img/fondo-creditos.png');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            font-family: sans-serif; 
            overflow: hidden; 
        }

/* 3. EL LIENZO QUE CENTRA TODO PERFECTAMENTE */
.lienzo-creditos-completo {
            position: relative; /* Atrapa al personaje y la flecha */
            width: 100%;
            max-width: 480px; /* Tamaño máximo para PC */
            height: 100vh;
            margin: 0 auto;
            
            /* 👇 Flexbox: ¡Esto es magia! 👇 */
            display: flex;
            flex-direction: column;  /* Apila las cartas una debajo de la otra */
            justify-content: center; /* Centra las cartas VERTICALMENTE */
            align-items: center;     /* Centra las cartas HORIZONTALMENTE */
            
            gap: 20px; /* Espacio fijo entre las dos cartas */
            padding: 20px; /* Margen de seguridad a los lados */
        }

        
        /* 4. TUS CARTAS INDIVIDUALES */
        .carta-info {
            position: absolute;
            bottom: 17%;

            width: 102%; /* Ocupa el ancho disponible seguro */
            
            /* 👇 ESTO EVITA QUE SE DEFORMEN O APLASTEN 👇 */
            max-height: 73dvh; /* Cada carta no puede medir más del 40% del alto de la pantalla */
            object-fit: contain; /* Mantiene la proporción perfecta del PNG */
            
            z-index: 2; /* Debajo del personaje y de la flecha */
        }

        /* 4. EL BOTÓN DE REGRESAR */
        .btn-regresar {
            position: absolute;
            top: 89.5%;    
            left: 9%;   
            width: 10%; 
            max-width: 45px; 
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-regresar:active {
            transform: scale(0.9);
        }

        .btn-regresar img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="contenedor-creditos">
        
        <img src="img/creditos-finales.png" alt="informacion" class="carta-info">

        <a href="index.html" class="btn-regresar">
            <img src="img/flecha.png" alt="Regresar">
        </a>

    </div>

</body>
</html>
