<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créditos | Next Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 1. EL FONDO SEGURO */
        body, html { 
            width: 100%; 
            height: 100%;
            background-color: #000; 
            background-image: url('img/fondo-creditos.png');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            font-family: sans-serif; 
            overflow: hidden; 
        }

        /* 2. LA CAJA QUE CENTRA TUS CARTAS */
        .contenedor-creditos {
            width: -100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra verticalmente */
            align-items: center;     /* Centra horizontalmente */
            gap: 22px;               /* Separación entre las dos cartas */
        }

        /* 3. TUS CARTAS */
        .carta-info {
            position: relative;
            width: 80%;         
            max-height: 50vh;   /* Ajustado para que las dos entren perfecto en pantalla */
            object-fit: contain; 
            z-index: 2;
        }

        /* 4. EL BOTÓN DE REGRESAR */
        .btn-regresar {
            position: absolute;
            top: 89.5%;    
            left: 9%;   
            width: 10%; 
            max-width: 40px; 
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-regresar:active {
            transform: scale(0.9);
        }

        .btn-regresar img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="contenedor-creditos">
        
        <img src="img/avales.png" alt="Informacion" class="carta-info">
        <img src="img/creditos.png" alt="informacion" class="carta-info">

        <a href="index.html" class="btn-regresar">
            <img src="img/flecha.png" alt="Regresar">
        </a>

    </div>

</body>
</html>
