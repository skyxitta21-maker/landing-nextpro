<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Pro Landing Page</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <style>
        /* 1. RESETEO BÁSICO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            background-color: #1a1a1a;
            overflow-x: hidden; /* Corta el sangrado para que no haya scroll horizontal */
        }

        /* 2. EL LIENZO PRINCIPAL */
        .lienzo-maestro {
            position: relative;
            width: 100%;
            max-width: 480px; /* Tamaño máximo para que se vea bien en PC */
            margin: 0 auto;
            overflow: hidden; /* Fundamental para que la ruleta sangre bien */
        }

        .capa-logo {
            position: absolute;
            top: 2.5%;     /* Ajusta para que pise la cinta donde quieres */
            right: 7.5%;     /* Ubicado a la derecha */
            width: 85%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            pointer-events: none;
        }

        /* 3. CAPAS BASE (El Fondo y la Cinta Larga) */
        .capa-fondo {
            width: 100%;
            height: auto; /* Mantiene la proporción perfecta, CERO deformación */
            display: block;
        }

        .capa-cinta {
            position: absolute;
            top: 9.9%;
            left: 0;
            width: 101%;
            height: auto;
            overflow: hidden;
            z-index: 2; /* Por encima del fondo y la ruleta */
            pointer-events: none; /* Para que no estorbe si hay clics */
        }

        /* 4. LA RULETA (Sangrando a la izquierda en la pantalla 1) */
        .ruleta-container {
            position: absolute;
            /* Estos porcentajes son relativos al ALTO y ANCHO TOTAL de las 5 pantallas */
            top: 13.4%;       /* Ajusta este valor para subirla o bajarla */
            left: -20%;    /* El sangrado a la izquierda */
            width: 93%;    /* Tamaño de la ruleta */
            z-index: 1;    /* Detrás de la cinta */
            pointer-events: none;
        }

        .ruleta-img {
            width: 100%;
            animation: girar 20s linear infinite;
        }

        @keyframes girar {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* 5. LOS PERSONAJES SEPARADOS */
        .personaje-1 {
            position: absolute;
            top: 16.3%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -1%;      /* Ubicado a la izq */
            width: 78%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .personaje-2 {
            position: absolute;
            top: 26.8%;       /* Ajusta para ubicar al segundo personaje */
            right: -2.5%;     /* Ubicado a la derecha */
            width: 48%;
            z-index: 3;
            overflow: hidden;
            pointer-events: none;
        }

        .personaje-3 {
            position: absolute;
            top: 30.8%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -1%;      /* Ubicado a la izq */
            width: 55%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .personaje-4 {
            position: absolute;
            top: 38.1%;       /* Ajusta para ubicar al segundo personaje */
            right: 9%;     /* Ubicado a la derecha */
            width: 52%;
            z-index: 3;
            pointer-events: none;
        }

        .personaje-5 {
            position: absolute;
            top: 48.3%;       /* Ajusta para ubicar al segundo personaje */
            right: 1%;     /* Ubicado a la derecha */
            width: 28%;
            z-index: 3;
            pointer-events: none;
        }

        .personaje-6 {
            position: absolute;
            top: 55.1%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: 12.2%;      /* Ubicado a la izq */
            width: 25%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            pointer-events: none;
        }

        .personaje-7 {
            position: absolute;
            top: 63.5%;       /* Ajusta para ubicar al segundo personaje */
            right: 1%;     /* Ubicado a la derecha */
            width: 29%;
            z-index: 3;
            pointer-events: none;
        }

        .personaje-8 {
            position: absolute;
            top: 70%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -1%;      /* Ubicado a la izq */
            width: 55%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .personajes-todos1 {
            position: absolute;
            top: 89%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -19%;      /* Ubicado a la izq */
            width: 135%;    /* Tamaño del personaje */
            z-index: 3;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .Final-noah {
            position: absolute;
            top: 88.3%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -19.4%;      /* Ubicado a la izq */
            width: 66%;    /* Tamaño del personaje */
            z-index: 2;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .Final-erika {
            position: absolute;
            top: 88.3%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: 60%;      /* Ubicado a la izq */
            width: 65%;    /* Tamaño del personaje */
            z-index: 2;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .Final-donjulio {
            position: absolute;
            top: 85.6%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: 24%;      /* Ubicado a la izq */
            width: 56%;    /* Tamaño del personaje */
            z-index: 2;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        .personajes-todos2 {
            position: absolute;
            top: 83.4%;     /* Ajusta para que pise la cinta donde quieres */ 
            left: -18%;      /* Ubicado a la izq */
            width: 135%;    /* Tamaño del personaje */
            z-index: 1;    /* Al frente de todo */
            overflow: hidden;
            pointer-events: none;
        }

        /* 6. EL BOTÓN FINAL (Al fondo de la pantalla 5) */
        .btn-jugar {
            position: absolute;
            bottom: 18.1%;    /* Lo anclamos al final del todo el lienzo */
            left: 10%;     /* Lo centramos (10% + 80% ancho + 10% = 100%) */
            width: 80%;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-jugar:active {
            transform: scale(0.95);
        }

        .btn-jugar img {
            width: 100%;
            display: block;
        }

        @keyframes respirar {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); } /* Crece un 2% */
    100% { transform: scale(1); }
}

.personaje-1, .personaje-5, .personaje-6, .personaje-7 {
    animation: respirar 3s ease-in-out infinite;
}

/* 1. Creamos la animación */
@keyframes flotar {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); } /* Sube 10 píxeles */
    100% { transform: translateY(0px); }
}

/* 2. Se la aplicamos a los personajes */
.personaje-2 {
    /* ... todo lo que ya tenías ... */
    animation: flotar 4s ease-in-out infinite;
}

.personaje-3 {
    animation: flotar 6s ease-in-out 1s infinite;
}

.personaje-4 {
    animation: flotar 4s ease-in-out 2s infinite;
}

.personaje-8 {
    animation: flotar 2s ease-in-out 1s infinite;
} 

        .Final-donjulio {
            animation: flotar 1s ease-in-out 1s infinite;
        } 

        .Final-erika {
            animation: flotar 3s ease-in-out 1s infinite;
        } 

        .Final-noah {
            animation: flotar 4s ease-in-out 1s infinite;
        } 

.capa-logo {
    animation: flotar 5s ease-in-out 1s infinite;
}

@keyframes aparecerDesdeAbajo {
    0% { 
        opacity: 0; 
        transform: translateY(30px); 
    }
    100% { 
        opacity: 1; 
        transform: translateY(0px); 
    }
}

.personajes-todos {
    animation: aparecerDesdeAbajo 1.2s ease-out forwards;
}

@keyframes aura {
    0% { filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0)); }
    50% { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.7)); } /* Brillo blanco, puedes cambiar el color RGB */
    100% { filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0)); }
}

.capa-logo, .btn-jugar {
    animation: aura 3s ease-in-out infinite;
}
    </style>

</head>
<body>

    <div class="lienzo-maestro">
        
        <img src="img/fondo.png" class="capa-fondo" alt="Fondo">

        <div class="ruleta-container">
            <img src="img/ruleta.png" class="ruleta-img" alt="Ruleta">
        </div>

        <img src="img/logo.png" class="capa-logo" alt="Textos">

        <img src="img/cinta.png" class="capa-cinta" alt="Textos">

            <img src="img/SPIKE.png" class="personaje-1" alt="Personaje">
            <img src="img/DONJULIO.png" class="personaje-2" alt="Personaje">
            <img src="img/SKY.png" class="personaje-3" alt="Personaje">
            <img src="img/ERIKA.png" class="personaje-4" alt="Personaje">
            <img src="img/NOAH.png" class="personaje-5" alt="Personaje">
            <img src="img/YAMILE.png" class="personaje-6" alt="Personaje">
            <img src="img/ERIK.png" class="personaje-7" alt="Personaje">
            <img src="img/DRA.png" class="personaje-8" alt="Personaje">

        <img src="img/P1-final.png" class="personajes-todos1" alt="Personaje">

        <img src="img/final-DONJULIO.png" class="Final-donjulio" alt="Personaje">

        <a href="https://nextpro-eta.vercel.app" class="btn-jugar">
            <img src="img/boton-jugar.png" alt="Jugar">
        </a>

    </div>

</body>
</html>
